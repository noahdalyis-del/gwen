<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: white;
}

/* container for positioning */
.container {
  position: relative;
  width: 320px;
}

/* main image */
.main {
  width: 100%;
  display: block;
  position: relative;
  z-index: 2;
}

/* "Bitchin" (top, slightly left + tilted) */
.top {
  position: absolute;
  top: -80px;
  left: -40px;
  width: 140%;
  transform: rotate(-10deg);
  z-index: 1;
}

/* hearts (bottom right, small + tight) */
.bottom {
  position: absolute;
  bottom: -30px;
  right: -30px;
  width: 120px;
  z-index: 1;
}
</style>
</head>

<body>

<div class="container">
  <img src="IMG_5064.jpeg" class="top">
  <img src="IMG_5029.png" class="main">
  <img src="IMG_5065.jpeg" class="bottom">
</div>

</body>
</html>
