<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  height: 100vh;
  background: white;
  position: relative;
}

/* TOP TEXT IMAGE */
.top {
  position: absolute;
  top: 0;
  left: 0;
  width: 70%;
  z-index: 1;
}

/* MAIN GIRAFFE */
.main {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 45%;
  z-index: 3;
}

/* HEARTS */
.bottom {
  position: absolute;
  bottom: 5%;
  right: 5%;
  width: 22%;
  z-index: 1;
}
</style>
</head>

<body>

<img src="IMG_5064.jpeg" class="top">
<img src="IMG_5065.jpeg" class="bottom">
<img src="IMG_5029.png" class="main">

</body>
</html>
