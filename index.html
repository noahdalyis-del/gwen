<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      background: white;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* TOP IMAGE */
    .top-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 35vh;
      object-fit: cover;
      z-index: 1;
    }

    /* BOTTOM IMAGE */
    .bottom-img {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 35vh;
      object-fit: cover;
      z-index: 1;
    }

    /* MAIN IMAGE (on top) */
    .main-img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 45%;
      height: auto;
      z-index: 2;
    }
  </style>
</head>
<body>

  <img src="IMG_5064.jpeg" class="top-img">
  <img src="IMG_5065.jpeg" class="bottom-img">
  <img src="IMG_5029.png" class="main-img">

</body>
</html>
