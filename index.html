<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: white;
}

/* container holds everything */
.container {
  position: relative;
  width: 60vw;
  max-width: 400px;
}

/* main image */
.main {
  width: 100%;
  display: block;
  z-index: 3;
  position: relative;
}

/* TOP text (slightly above + left of main) */
.top {
  position: absolute;
  top: -60px;
  left: -40px;
  width: 120%;
  z-index: 1;
}

/* HEARTS (bottom right of main, tighter + smaller) */
.bottom {
  position: absolute;
  bottom: -40px;
  right: -20px;
  width: 35%;
  z-index: 1;
}
</style>
</head>

<body>

<div class="container">
  <img src="IMG_5064.jpeg" class="top">
  <img src="IMG_5029.png" class="main">
  <img src="IMG_5065.jpeg" class="bottom">
</div>

</body>
</html>
