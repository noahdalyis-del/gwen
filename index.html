<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* top image */
    .top-img {
      width: 100%;
      height: 30vh;
      object-fit: cover;
    }

    /* main image */
    .main-img {
      width: 60%;
      height: auto;
      margin: 20px 0;
    }

    /* bottom image */
    .bottom-img {
      width: 100%;
      height: 30vh;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <!-- TOP -->
  <img src="IMG_5064.jpeg" class="top-img">

  <!-- MAIN -->
  <img src="IMG_5029.png" class="main-img">

  <!-- BOTTOM -->
  <img src="IMG_5065.jpeg" class="bottom-img">

</body>
</html>
