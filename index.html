<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      background: white;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .top-img {
      position: absolute;
      top: 10%;
      left: -8%;
      width: 95%;
      height: auto;
      z-index: 1;
    }

    .main-img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50%;
      height: auto;
      z-index: 3;
    }

    .bottom-img {
      position: absolute;
      bottom: 2%;
      left: -5%;
      width: 110%;
      height: auto;
      z-index: 1;
    }
  </style>
</head>
<body>

  <img src="IMG_5064.jpeg" class="top-img">

  <img src="IMG_5029.png" class="main-img">

  <img src="IMG_5065.jpeg" class="bottom-img">

</body>
</html>
