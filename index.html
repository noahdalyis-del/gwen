<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  height: 100vh;
  background: white;
  position: relative;
  overflow: hidden;
}

/* TOP "Bitchin" */
.top {
  position: absolute;
  top: 0;
  left: -20%;
  width: 140%;
  z-index: 1;
}

/* MAIN GIRAFFE */
.main {
  position: absolute;
  top: 52%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 45%;
  z-index: 3;
}

/* BOTTOM HEARTS */
.bottom {
  position: absolute;
  bottom: -5%;
  right: -10%;
  width: 90%;
  z-index: 1;
}
</style>
</head>

<body>

<img src="IMG_5064.jpeg" class="top">
<img src="IMG_5029.png" class="main">
<img src="IMG_5065.jpeg" class="bottom">

</body>
</html>
