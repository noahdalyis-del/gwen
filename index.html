<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  height: 100vh;
  background: white;
  position: relative;
  overflow: hidden;
}

/* TOP TEXT */
.top {
  position: absolute;
  top: 10%;
  left: -18%;
  width: 140%;
  z-index: 1;
}

/* MAIN IMAGE */
.main {
  position: absolute;
  top: 52%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 48%;
  z-index: 3;
}

/* HEARTS (FIXED) */
.bottom {
  position: absolute;
  bottom: 5%;
  right: 5%;
  width: 35%;   /* much smaller */
  z-index: 1;
}
</style>
</head>

<body>

<img src="IMG_5064.jpeg" class="top">
<img src="IMG_5029.png" class="main">
<img src="IMG_5065.jpeg" class="bottom">

</body>
</html>
